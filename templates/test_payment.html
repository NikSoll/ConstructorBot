{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 50px auto; text-align: center; background: white; padding: 40px; border-radius: 20px;">
    <h1>🧪 Тест оплаты</h1>
    <p>Бот: Тестовый бот</p>
    <p>Цена: 100 ₽</p>
    
    <form action="{{ url_for('payment.create_payment') }}" method="POST">
        <input type="hidden" name="bot_id" value="4">  <!-- ID твоего тестового бота -->
        <button type="submit" style="background: #10b981; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;">
            💳 Оплатить 100 ₽
        </button>
    </form>
</div>
{% endblock %}
